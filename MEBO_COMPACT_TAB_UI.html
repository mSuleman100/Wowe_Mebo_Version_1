<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mebo Compact Control Panel UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #070b10;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Right Side Panel Container (320-360px wide) */
        .control-panel-container {
            width: 360px;
            height: 90vh;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 0;
            border-radius: 6px;
            border: 1px solid rgba(70, 160, 190, 0.18);
            background: linear-gradient(180deg, rgba(12, 28, 41, 0.92), rgba(7, 14, 20, 0.90));
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.55);
            overflow: hidden;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(70, 160, 190, 0.18);
            background: linear-gradient(180deg, rgba(12, 28, 41, 0.75), rgba(8, 18, 26, 0.6));
        }

        /* For MEBO: Hide tabs if only one tab */
        .tabs:has(.tab:only-child) {
            padding: 8px 16px;
        }

        .tabs:has(.tab:only-child) .tab {
            width: 100%;
            justify-content: center;
        }

        .tab {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: transparent;
            color: rgba(235, 245, 255, 0.6);
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: 11px;
            cursor: pointer;
            transition: all 120ms ease;
        }

        .tab--active {
            border-color: rgba(39, 211, 255, 0.45);
            background: rgba(10, 24, 36, 0.65);
            color: #27d3ff;
            box-shadow: 0 0 0 1px rgba(39, 211, 255, 0.12) inset;
        }

        /* Tab Content - Scrollable */
        .tab-content {
            overflow-y: auto;
            overflow-x: hidden;
            flex: 1;
            min-height: 0;
        }

        /* Ensure no scrolling needed - all controls visible */
        .card__body {
            padding: 10px;
        }

        /* Reduce spacing in dividers */
        .divider {
            margin: 8px 0;
        }

        /* Compact server settings */
        .server {
            margin-bottom: 10px;
        }

        /* Compact robot selector */
        .robot-type-selector {
            margin-bottom: 10px;
            padding: 10px;
        }

        /* Card */
        .card {
            background: transparent;
            border: none;
        }

        .card__header {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(70, 160, 190, 0.18);
            background: linear-gradient(180deg, rgba(15, 35, 52, 0.9), rgba(12, 28, 41, 0.65));
        }

        .card__title {
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: 12px;
            color: rgba(235, 245, 255, 0.92);
        }

        .card__subtitle {
            color: #27d3ff;
            font-size: 11px;
            margin-top: 4px;
        }

        .card__body {
            padding: 16px;
        }

        /* Server Settings */
        .server {
            margin-bottom: 16px;
        }

        .label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(235, 245, 255, 0.7);
            margin-bottom: 6px;
            font-weight: 700;
        }

        .input {
            width: 100%;
            padding: 8px 12px;
            background: rgba(10, 24, 36, 0.6);
            border: 1px solid rgba(70, 160, 190, 0.3);
            border-radius: 4px;
            color: rgba(235, 245, 255, 0.92);
            font-size: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: 1px solid;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn--primary {
            background: rgba(39, 211, 255, 0.15);
            border-color: #27d3ff;
            color: #27d3ff;
        }

        .btn--primary:hover {
            background: rgba(39, 211, 255, 0.25);
        }

        /* Robot Type Selector */
        .robot-type-selector {
            background: rgba(15, 35, 52, 0.6);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            border: 1px solid rgba(70, 160, 190, 0.3);
        }

        .selector-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .type-btn {
            flex: 1;
            padding: 10px 12px;
            background: rgba(39, 211, 255, 0.15);
            border: 2px solid #27d3ff;
            color: #27d3ff;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .type-btn.active {
            background: #27d3ff;
            color: #0b1620;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: rgba(70, 160, 190, 0.18);
            margin: 16px 0;
        }

        /* Controls Grid - All visible at once - Professional Size */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        /* Professional Joystick - Larger */
        .joystick-section {
            background: rgba(10, 24, 36, 0.5);
            border-radius: 6px;
            border: 1px solid rgba(70, 160, 190, 0.2);
            padding: 12px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
        }

        .joystick-title {
            color: rgba(235, 245, 255, 0.8);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 700;
            text-align: center;
        }

        .joystick-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1;
        }

        .joystick-container {
            position: relative;
            width: 90px;
            height: 90px;
            flex-shrink: 0;
        }

        .joystick-base {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(39, 211, 255, 0.15);
            border: 3px solid rgba(39, 211, 255, 0.5);
            box-shadow:
                0 0 20px rgba(39, 211, 255, 0.3),
                inset 0 0 15px rgba(39, 211, 255, 0.1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .joystick-stick {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #27d3ff, #1fa8cc);
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow:
                0 3px 10px rgba(39, 211, 255, 0.5),
                inset 0 2px 5px rgba(255, 255, 255, 0.2);
            position: absolute;
            cursor: grab;
            transition: transform 0.1s ease-out;
        }

        .joystick-stick:active {
            cursor: grabbing;
        }

        .joystick-info {
            font-size: 8px;
            color: rgba(235, 245, 255, 0.6);
            line-height: 1.3;
            text-align: center;
        }

        /* Linear Slider Styles - Professional Size */
        .slider-section {
            background: rgba(10, 24, 36, 0.5);
            border-radius: 6px;
            border: 1px solid rgba(70, 160, 190, 0.2);
            padding: 12px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
        }

        .slider-title {
            color: rgba(235, 245, 255, 0.8);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 700;
            text-align: center;
        }

        /* Vertical Slider (Claw, Joints) - Larger */
        .slider-container-vertical {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex: 1;
        }

        .slider-track-vertical {
            width: 8px;
            height: 100px;
            background: rgba(10, 24, 36, 0.6);
            border-radius: 4px;
            border: 1px solid rgba(70, 160, 190, 0.3);
            position: relative;
            flex-shrink: 0;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .slider-handle-vertical {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #27d3ff, #1fa8cc);
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow:
                0 3px 12px rgba(39, 211, 255, 0.5),
                inset 0 2px 5px rgba(255, 255, 255, 0.2);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            cursor: grab;
            transition: transform 0.1s ease-out;
            top: 50%;
            margin-top: -16px;
        }

        .slider-handle-vertical:active {
            cursor: grabbing;
        }

        .slider-labels {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100px;
            font-size: 8px;
            color: rgba(235, 245, 255, 0.6);
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
        }

        /* Horizontal Slider (Rotation) - Larger */
        .slider-container-horizontal {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }

        .slider-labels-horizontal {
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            color: rgba(235, 245, 255, 0.6);
            font-weight: 700;
            text-transform: uppercase;
        }

        .slider-track-horizontal {
            width: 100%;
            height: 8px;
            background: rgba(10, 24, 36, 0.6);
            border-radius: 4px;
            border: 1px solid rgba(70, 160, 190, 0.3);
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .slider-handle-horizontal {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #32ffb7, #28cc9e);
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow:
                0 3px 12px rgba(50, 255, 183, 0.5),
                inset 0 2px 5px rgba(255, 255, 255, 0.2);
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            cursor: grab;
            transition: transform 0.1s ease-out;
            left: 50%;
            margin-left: -16px;
        }

        .slider-handle-horizontal:active {
            cursor: grabbing;
        }

        /* Stop Button - More Compact */
        .stop-section {
            margin-bottom: 8px;
        }

        .stop-button {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            background: linear-gradient(135deg, #ff3b3b, #cc2e2e);
            border: 2px solid rgba(255, 59, 59, 0.6);
            box-shadow:
                0 0 15px rgba(255, 59, 59, 0.5),
                inset 0 2px 4px rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 9px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .stop-button:active {
            transform: scale(0.98);
            box-shadow:
                0 0 12px rgba(255, 59, 59, 0.4),
                inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <div class="control-panel-container">
        <!-- Tabs - Only CONTROL PANEL for MEBO -->
        <div class="tabs">
            <button class="tab tab--active">CONTROL PANEL</button>
            <!-- SCRIPT tab hidden for MEBO -->
        </div>

        <!-- Tab Content (Scrollable) -->
        <div class="tab-content">
            <div class="card">
                <div class="card__header">
                    <div class="card__title">CONTROL PANEL</div>
                    <div class="card__subtitle">[MEBO]</div>
                </div>
                <div class="card__body">
                    <!-- Backend URL (Keep from Wowe) -->
                    <div class="server">
                        <label class="label" for="server-origin">BACKEND URL</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" class="input" id="server-origin" value="http://localhost:8002"
                                style="flex: 1;">
                            <button class="btn btn--primary">SAVE</button>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <!-- Robot Type Selector -->
                    <div class="robot-type-selector">
                        <label class="label">ROBOT TYPE</label>
                        <div class="selector-buttons">
                            <button class="type-btn">WOWE</button>
                            <button class="type-btn active">MEBO</button>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <!-- Robot Selector (Keep from Wowe) -->
                    <div style="margin-bottom: 16px;">
                        <label class="label" for="robot-select">ROBOT</label>
                        <select class="input" id="robot-select">
                            <option>ALPHA</option>
                            <option>BRAVO</option>
                            <option>CHARLIE</option>
                            <option>DELTA</option>
                        </select>
                    </div>

                    <div class="divider"></div>

                    <!-- Stop Button - Full Width -->
                    <div class="stop-section">
                        <button class="stop-button" id="stopBtn">STOP</button>
                    </div>

                    <!-- All Controls Grid - Everything Visible -->
                    <div class="controls-grid">
                        <!-- Movement Joystick -->
                        <div class="joystick-section">
                            <div class="joystick-title">Movement</div>
                            <div class="joystick-wrapper">
                                <div class="joystick-container">
                                    <div class="joystick-base">
                                        <div class="joystick-stick" id="joystick"></div>
                                    </div>
                                </div>
                                <div class="joystick-info">
                                    ↑FWD ↓REV<br>
                                    ←L →R
                                </div>
                            </div>
                        </div>

                        <!-- Claw Gripper - Linear Vertical Slider -->
                        <div class="slider-section"
                            style="background: rgba(255, 184, 32, 0.1); border-color: rgba(255, 184, 32, 0.3);">
                            <div class="slider-title" style="color: #ffb020;">Claw</div>
                            <div class="slider-container-vertical">
                                <div class="slider-track-vertical" id="slider-claw-track">
                                    <div class="slider-handle-vertical" id="slider-claw"
                                        style="background: linear-gradient(135deg, #ffb020, #ff9500); box-shadow: 0 0 12px rgba(255, 184, 32, 0.5);">
                                    </div>
                                </div>
                                <div class="slider-labels">
                                    <span style="color: rgba(255, 184, 32, 0.8);">↑OPEN</span>
                                    <span style="color: rgba(255, 184, 32, 0.8);">↓CLOSE</span>
                                </div>
                            </div>
                        </div>

                        <!-- Rotation - Linear Horizontal Slider -->
                        <div class="slider-section"
                            style="background: rgba(50, 255, 183, 0.1); border-color: rgba(50, 255, 183, 0.3);">
                            <div class="slider-title" style="color: #32ffb7;">Rotation</div>
                            <div class="slider-container-horizontal">
                                <div class="slider-labels-horizontal">
                                    <span style="color: rgba(50, 255, 183, 0.8);">←CCW</span>
                                    <span style="color: rgba(50, 255, 183, 0.8);">CW→</span>
                                </div>
                                <div class="slider-track-horizontal" id="slider-rotation-track">
                                    <div class="slider-handle-horizontal" id="slider-rotation"
                                        style="background: linear-gradient(135deg, #32ffb7, #28cc9e); box-shadow: 0 0 12px rgba(50, 255, 183, 0.5);">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Joint 1 - Linear Vertical Slider -->
                        <div class="slider-section"
                            style="background: rgba(39, 211, 255, 0.1); border-color: rgba(39, 211, 255, 0.3);">
                            <div class="slider-title" style="color: #27d3ff;">Joint 1</div>
                            <div class="slider-container-vertical">
                                <div class="slider-track-vertical" id="slider-joint1-track">
                                    <div class="slider-handle-vertical" id="slider-joint1"></div>
                                </div>
                                <div class="slider-labels">
                                    <span>↑UP</span>
                                    <span>↓DOWN</span>
                                </div>
                            </div>
                        </div>

                        <!-- Joint 2 - Linear Vertical Slider -->
                        <div class="slider-section"
                            style="background: rgba(39, 211, 255, 0.1); border-color: rgba(39, 211, 255, 0.3);">
                            <div class="slider-title" style="color: #27d3ff;">Joint 2</div>
                            <div class="slider-container-vertical">
                                <div class="slider-track-vertical" id="slider-joint2-track">
                                    <div class="slider-handle-vertical" id="slider-joint2"></div>
                                </div>
                                <div class="slider-labels">
                                    <span>↑UP</span>
                                    <span>↓DOWN</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Joystick interaction function
        function setupJoystick(joystickId, maxDistance = 25) {
            const joystick = document.getElementById(joystickId);
            if (!joystick) return;

            const joystickBase = joystick.parentElement;
            let isDragging = false;
            let activeJoystick = null;

            const handleStart = (e) => {
                isDragging = true;
                activeJoystick = joystickId;
                e.preventDefault();
            };

            const handleMove = (clientX, clientY) => {
                if (!isDragging || activeJoystick !== joystickId) return;

                const rect = joystickBase.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                const deltaX = clientX - centerX;
                const deltaY = clientY - centerY;
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

                if (distance > maxDistance) {
                    const angle = Math.atan2(deltaY, deltaX);
                    const newX = Math.cos(angle) * maxDistance;
                    const newY = Math.sin(angle) * maxDistance;
                    joystick.style.transform = `translate(${newX}px, ${newY}px)`;
                } else {
                    joystick.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                }
            };

            const handleEnd = () => {
                if (activeJoystick === joystickId) {
                    isDragging = false;
                    activeJoystick = null;
                    joystick.style.transform = 'translate(0, 0)';
                }
            };

            // Mouse events
            joystick.addEventListener('mousedown', handleStart);

            document.addEventListener('mousemove', (e) => {
                handleMove(e.clientX, e.clientY);
            });

            document.addEventListener('mouseup', handleEnd);

            // Touch events
            joystick.addEventListener('touchstart', handleStart);

            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    handleMove(e.touches[0].clientX, e.touches[0].clientY);
                }
            });

            document.addEventListener('touchend', handleEnd);
        }

        // Setup movement joystick (circular) - professional size
        setupJoystick('joystick', 27);

        // Setup linear sliders
        function setupVerticalSlider(sliderId, trackId) {
            const slider = document.getElementById(sliderId);
            const track = document.getElementById(trackId);
            if (!slider || !track) return;

            let isDragging = false;
            const trackHeight = 100;
            const handleSize = 32;
            const maxDistance = (trackHeight - handleSize) / 2;

            const handleStart = (e) => {
                isDragging = true;
                e.preventDefault();
            };

            const handleMove = (clientY) => {
                if (!isDragging) return;

                const rect = track.getBoundingClientRect();
                const centerY = rect.top + rect.height / 2;
                const deltaY = clientY - centerY;
                const clampedY = Math.max(-maxDistance, Math.min(maxDistance, deltaY));

                slider.style.top = `${50 + (clampedY / maxDistance) * 50}%`;
                slider.style.transform = 'translateX(-50%)';
            };

            const handleEnd = () => {
                if (isDragging) {
                    isDragging = false;
                    slider.style.top = '50%';
                    slider.style.transform = 'translateX(-50%)';
                }
            };

            slider.addEventListener('mousedown', handleStart);
            document.addEventListener('mousemove', (e) => handleMove(e.clientY));
            document.addEventListener('mouseup', handleEnd);

            slider.addEventListener('touchstart', handleStart);
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) handleMove(e.touches[0].clientY);
            });
            document.addEventListener('touchend', handleEnd);
        }

        function setupHorizontalSlider(sliderId, trackId) {
            const slider = document.getElementById(sliderId);
            const track = document.getElementById(trackId);
            if (!slider || !track) return;

            let isDragging = false;
            const trackWidth = track.offsetWidth;
            const handleSize = 32;
            const maxDistance = (trackWidth - handleSize) / 2;

            const handleStart = (e) => {
                isDragging = true;
                e.preventDefault();
            };

            const handleMove = (clientX) => {
                if (!isDragging) return;

                const rect = track.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const deltaX = clientX - centerX;
                const clampedX = Math.max(-maxDistance, Math.min(maxDistance, deltaX));

                slider.style.left = `${50 + (clampedX / maxDistance) * 50}%`;
                slider.style.transform = 'translateY(-50%)';
            };

            const handleEnd = () => {
                if (isDragging) {
                    isDragging = false;
                    slider.style.left = '50%';
                    slider.style.transform = 'translateY(-50%)';
                }
            };

            slider.addEventListener('mousedown', handleStart);
            document.addEventListener('mousemove', (e) => handleMove(e.clientX));
            document.addEventListener('mouseup', handleEnd);

            slider.addEventListener('touchstart', handleStart);
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) handleMove(e.touches[0].clientX);
            });
            document.addEventListener('touchend', handleEnd);
        }

        // Setup all sliders
        setupVerticalSlider('slider-claw', 'slider-claw-track');
        setupHorizontalSlider('slider-rotation', 'slider-rotation-track');
        setupVerticalSlider('slider-joint1', 'slider-joint1-track');
        setupVerticalSlider('slider-joint2', 'slider-joint2-track');
    </script>
</body>

</html>
